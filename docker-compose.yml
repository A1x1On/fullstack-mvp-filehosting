services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

  backend-db:
    image: postgres:16
    container_name: backend-db
    ports:
      - "5433:5432"
    env_file: ".env"
    volumes:
      - backend-db-volume:/var/lib/postgresql/data

  backend-redis:
    image: redis:latest
    container_name: backend-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: uvicorn src.app:app --host 0.0.0.0 --reload --port 8000
    container_name: backend
    volumes:
      - ./backend:/backend
    env_file: ".env"
    ports:
      - "8000:8000"

  backend-worker:
    build: ./backend
    command: [ 'celery', '-A', 'src.tasks.celery_app', 'worker', '-l', 'info' ]
    container_name: backend-worker
    env_file: ".env"
    volumes:
      - ./backend:/backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend-db-volume:
  redis_data: